name: Generate assignment and solution versions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-notebook:
    name: Generate assignment and solution versions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FG_MUDE_2025_token }}

      - name: Commit and push changes assignment version
        env:
          TOKEN: ${{ secrets.FG_MUDE_2025_token }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin
          # Pull the existing assignment branch
          git checkout -b assignment origin/assignment
          # Merge latest changes from main
          git merge origin/main
          git rm .github/workflows/generate-student-notebook.yml || true
          git rm requirements.txt || true
          if ! git diff --cached --quiet || ! git diff --quiet; then
            git add .
            git commit -m "Update from main" || true
          fi
          git push origin assignment --force

      - name: Commit and push solution version
        env:
          TOKEN: ${{ secrets.FG_MUDE_2025_token }}
        run: |
          git fetch origin
          # Pull the existing solution branch
          git checkout -b solution origin/solution
          # Merge latest changes from main
          git merge origin/main
          git rm .github/workflows/generate-student-notebook.yml || true
          git rm requirements.txt || true
          if ! git diff --cached --quiet || ! git diff --quiet; then
            git add .
            git commit -m "Remove requirements and workflow file from solution branch" || true
          fi
          git push origin solution --force
